<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Aquaworld Systems - Credit Report Parser</title>

    <style>

        body{
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            background:#f0f8ff;
            margin:0;
            padding:0;
        }

        .container{
            max-width:600px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,.1);
            text-align:center;
        }

        h2{
            color:#023e8a;
            margin-bottom:20px;
        }

        h3{
            color:#023e8a;
        }

        input[type=file]{

            width:80%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;

        }

        button{

            margin-top:15px;
            padding:12px 25px;

            background:#0077b6;
            color:white;

            border:none;
            border-radius:5px;

            cursor:pointer;

            font-size:16px;

        }

        button:hover{

            background:#0096c7;

        }

        .result{

            margin-top:25px;

            background:#caf0f8;

            border-radius:8px;

            padding:20px;

            text-align:left;

        }

        .result p{

            margin:8px 0;

            font-size:16px;

        }

        .error{

            margin-top:20px;

            background:#ffdede;

            color:#b00020;

            padding:15px;

            border-radius:8px;

            font-weight:bold;

        }

        footer{

            margin-top:25px;

            text-align:right;

            color:#666;

            font-size:12px;

        }

    </style>

</head>

<body>

<div class="container">

    <img src="https://i.ibb.co/4RF25L4k/aquaworldsystem.png"
         style="width:40%;">

    <h2>Subir reporte de crédito TransUnion (PDF)</h2>

    <form method="POST" enctype="multipart/form-data">

        <input
            type="file"
            name="pdf"
            accept=".pdf"
            required>

        <br>

        <button type="submit">
            Procesar
        </button>

    </form>

    {% if error %}

        <div class="error">

            {{ error }}

        </div>

    {% endif %}

    {% if result %}

        <div class="result">

            <h3>Resultado</h3>

            <p>
                <b>Nombre completo:</b>
                {{ result.nombre }}
            </p>

            <p>
                <b>Score:</b>
                {{ result.score }}
            </p>

            <p>
                <b>Gastos ($):</b>
                {{ result.gastos }}
            </p>

        </div>

    {% endif %}

    <footer>

        by Anderson Pupuche

    </footer>

</div>

</body>
</html>
